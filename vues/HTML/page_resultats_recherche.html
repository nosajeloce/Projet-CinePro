<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Cinepro - Connexion</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script src='../../bootstrap/js/bootstrap.bundle.js'></script>
    <script defer src="../../jquery/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="../../CSS/general.css">    
    <link rel="stylesheet" href="../../CSS/resultats_recherche.css">
    <link rel='stylesheet' type='text/css' media='screen' href='../../bootstrap/css/bootstrap.css'>
    <link rel="stylesheet" href="../../bootstrap/bootstrap-icons/font/bootstrap-icons.css">
    <script defer src="../../js/page_resultats_recherche.js"></script>

</head>
<body>
    <div class="d-flex flex-column justify-content-between">
        
        <div class="bg-dark">
            <!--Barre en haut-->
            <div class="px-4 py-1 container-fluid d-flex justify-content-between">
                <div class="fs-1 d-flex justify-content-between align-items-center">                    
                    <i class="bi bi-film text-warning d-block"></i>
                    <span class="text-white d-block">Cinepro</span>

                </div>
                <div class="d-flex justify-content-between align-items-center recherche-connexion-panier">
                    <form class="container-fluid p-1 d-flex justify-content-evenly bg-light" action="" method="get">
                            <select name="categorie">
                                <option selected>Tout</option>
                                <option value="film">Film</option>
                                <option value="categorie-film">Catégorie</option>
                                <option value="promotion">Promotion</option>
                            </select>
                            <input class="barre-recherche form-control-lg ms-1" type="search" placeholder="Rechercher film, catégorie, etc." name="recherche" >
                            <button type="submit" class="bg-dark"><i class="bi bi-search text-white bg-dark fs-3 p-2"></i></button>
                    </form>
                    <div class="haut-droit-header">
                        <div class="d-flex align-items-center justify-content-end ">
                            <a href="connexion.html" class="text-decoration-none ">
                                <div class="fs-5 fw-bold text-wrap text-dark bg-light border p-2 rounded">
                                    Se connecter
                                </div>
                            </a>
                            <div>
                                <i class="bi bi-cart2 text-white fs-1 ps-2 ms-3"></i>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!--Le bas du header-->
            <div class="container-fluid d-flex">
                <div class="container">
                    <ul class="nav nav-fill nav-pills">
                        <li class="nav-item fs-5">
                        <a class="nav-link text-white" href="#"><i class="bi bi-house-door-fill"></i> Accueil</a>
                        </li>
                        <li class="nav-item fs-5">
                        <a class="nav-link text-white" href="#"><i class="bi bi-tv"></i> Cinémas</a>
                        </li>
                                            
                        <li class="nav-item fs-5">
                        <a class="nav-link text-white" href="contact.html"><i class="bi bi-telephone"></i> Contact</a>
                        </li>
    
                    </ul> 
                </div>
                <div class="container-fluid d-flex justify-content-end align-items-center">

                    <div class="fs-5 text-white ps-5">
                        <i class="bi bi-ticket-perforated text-"></i> Mes Réservations                   
                    </div>

                </div>
            </div>
        </div>
            <!--Contenu principal (Formulaire de connexion)-->
        <div class="bg-light p-5">
            <h2>Résultats pour ...</h2><br>
            <form id="choix-film" action="voirInfosFilm">
                <input id="id-film" type="text" name="id-film" hidden>
                <a href="" id="1" class="text-decoration-none text-dark d-block mt-3">
                    <div class="container-fluid film border border-dark d-flex align-items-center">
                        <div class="d-flex align-items-center">
                            <img src="../../movie.png" alt="Oppenheimer">
                        </div>
                        <div class="p-3">
                            <h3>Oppenheimer</h3>
                            <div>
                                Genre du film: Thriller
                            </div>                        
                            <div>Durée du film: 1h30</div>
                        </div>
                    </div>                
                </a>
                <a href="" id=15 class="text-decoration-none text-dark d-block mt-3">
                    <div class="container-fluid film border border-dark d-flex align-items-center">
                        <div class="d-flex align-items-center">
                            <img src="../../movie.png" alt="Oppenheimer">
                        </div>
                        <div class="p-3">
                            <h3>Oppenheimer</h3>
                            <div>
                                Genre du film: Thriller
                            </div>                        
                            <div>Durée du film: 1h30</div>
                        </div>
                    </div>                
                </a>
            </form>
        </div>
        <!--Pied de page-->
        <div class="d-flex flex-wrap container-fluid justify-content-end align-items-center pied">
            <div class="text-white">
                &copy; CinePro
            </div>
        </div>

    </div>
</body>
</html>
