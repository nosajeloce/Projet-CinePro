<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}

#myInput {
  background-image: url('/css/searchicon.png');
  background-position: 10px 10px;
  background-repeat: no-repeat;
  width: 100%;
  font-size: 16px;
  padding: 12px 20px 12px 40px;
  border: 1px solid #ddd;
  margin-bottom: 12px;
}

#myTable {
  border-collapse: collapse;
  width: 100%;
  border: 1px solid #ddd;
  font-size: 18px;
}

#myTable th, #myTable td {
  text-align: left;
  padding: 12px;
}

#myTable tr {
  border-bottom: 1px solid #ddd;
}

#myTable tr.header, #myTable tr:hover {
  background-color: #f1f1f1;
}
</style>
</head>
<body>

<h2>My Customers</h2>

<form action="" method="get">

  <select id="categorie_recherche" onclick="test()" class="form-select" aria-label="Default select example">
    <option value="name" selected>Name</option>
    <option value="country">Country</option>
  </select>

  <input type="text" id="myInput" onkeyup="myFunction()" placeholder="Search for names.." title="Type in a name">
  <input type="submit" hidden>

</form>

<table id="myTable">
  <tr class="header">
    <th style="width:60%;">Name</th>
    <th style="width:40%;">Country</th>
  </tr>
  <tr>
    <td>Alfreds Futterkiste</td>
    <td>Germany</td>
  </tr>
  <tr>
    <td>Berglunds snabbkop</td>
    <td>Sweden</td>
  </tr>
  <tr>
    <td>Island Trading</td>
    <td>UK</td>
  </tr>
  <tr>
    <td>Koniglich Essen</td>
    <td>Germany</td>
  </tr>
  <tr>
    <td>Laughing Bacchus Winecellars</td>
    <td>Canada</td>
  </tr>
  <tr>
    <td>Magazzini Alimentari Riuniti</td>
    <td>Italy</td>
  </tr>
  <tr>
    <td>North/South</td>
    <td>UK</td>
  </tr>
  <tr>
    <td>Paris specialites</td>
    <td>France</td>
  </tr>
</table>
<!--https://www.w3schools.com/howto/tryit.asp?filename=tryhow_js_filter_table-->
<script>
function myFunction() {
  //On a la recherche par nom, mais il faut la recherche par le pays aussi.
  var input, filter, table, tr,  i, txtValue;

  input = document.getElementById("myInput");
  filter = input.value.toUpperCase();  
  categorie_recherche = document.getElementById("categorie_recherche");
  categorie_valeur=categorie_recherche.value;
  table = document.getElementById("myTable");
  let myArray = [];

  myArray['name'] = 0;
  myArray['country'] = 1;

  tr = table.getElementsByTagName("tr");
  let counter = 0;
  let display;

      for (i = 0; i < tr.length; i++) {
      td = tr[i].getElementsByTagName("td")[myArray[categorie_valeur]];
      if (td) {
        txtValue = td.textContent || td.innerText;
        if (txtValue.toUpperCase().indexOf(filter) > -1) {
          tr[i].style.display = "";
        } else {
          tr[i].style.display = "none";
        }
      }       
    }
  }





function test(){

  let dropdownList = document.getElementById('categorie_recherche');
  dropdownList.onchange = (ev) =>{
    return dropdownList.value;        
  }
}
</script>

</html>
